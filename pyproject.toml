[build-system]
requires = [
    "packaging>=23.2",
    "scikit-build-core>=0.10",
]
build-backend = "scikit_build_core.build"

[project]
name = "gobot"
version = "0.1.0"
description = "Python bindings for the Gobot robotics scene, simulation, and rendering engine."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "LGPL-3.0-or-later" }
authors = [
    { name = "RobSimulatorGroup" },
]
dependencies = [
    "numpy>=1.24",
]

[project.urls]
Homepage = "https://github.com/RobSimulatorGroup/gobot"
Repository = "https://github.com/RobSimulatorGroup/gobot"
Issues = "https://github.com/RobSimulatorGroup/gobot/issues"

[project.scripts]
gobot-editor = "gobot.cli:editor"
gobot_editor = "gobot.cli:editor"

[tool.scikit-build]
cmake.build-type = "Release"
build-dir = "build/{wheel_tag}"
wheel.packages = ["python/gobot"]

[tool.scikit-build.install]
components = ["python"]

[tool.scikit-build.cmake.define]
GOB_BUILD_PYTHON_BINDINGS = "ON"
GOB_BUILD_TESTS = "OFF"

[tool.cibuildwheel.config-settings]
"cmake.define.GOB_BUILD_MUJOCO" = "ON"
"cmake.define.GOB_FETCH_MUJOCO" = "ON"

[tool.cibuildwheel]
build = [
    "cp310-manylinux_x86_64",
    "cp311-manylinux_x86_64",
    "cp312-manylinux_x86_64",
    "cp313-manylinux_x86_64",
    "cp314-manylinux_x86_64",
]
build-frontend = "build"
test-command = "python -c \"import gobot; print(gobot.backend_infos())\""

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "manylinux_2_28"
before-all = [
    "dnf install -y eigen3-devel mesa-libGL-devel autoconf vim-common xorg-x11-server-devel libX11-devel libXcursor-devel libXext-devel libXi-devel libXinerama-devel libXrandr-devel libXrender-devel libXScrnSaver-devel libXxf86vm-devel libxcb-devel libXdamage-devel libXfixes-devel libuuid-devel",
]
