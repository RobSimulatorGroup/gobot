[build-system]
requires = [
    "packaging>=23.2",
    "scikit-build-core>=0.10",
]
build-backend = "scikit_build_core.build"

[project]
name = "gobot"
version = "0.1.5"
description = "Python bindings for the Gobot robotics scene, simulation, and rendering engine."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
    { name = "RobSimulatorGroup" },
]
dependencies = [
    "numpy>=1.24",
    "torch",
    "rsl-rl-lib==5.2.0",
    "tensordict",
    "tyro",
    "tensorboard",
]

[project.urls]
Homepage = "https://github.com/RobSimulatorGroup/gobot"
Repository = "https://github.com/RobSimulatorGroup/gobot"
Issues = "https://github.com/RobSimulatorGroup/gobot/issues"

[project.scripts]
gobot_editor = "gobot.cli:editor"
gobot_train = "gobot.rl.scripts.train:main"
train = "gobot.rl.scripts.train:main"

[tool.scikit-build]
cmake.build-type = "Release"
build-dir = "build/{wheel_tag}"
wheel.packages = ["python/gobot"]

[tool.scikit-build.install]
components = ["python"]

[tool.scikit-build.cmake.define]
GOB_BUILD_TESTS = "OFF"
