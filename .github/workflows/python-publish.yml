name: Publish Python Package

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish distributions to PyPI after the build succeeds."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U build cibuildwheel twine

      - name: Build source distribution
        run: python -m build --sdist

      - name: Build manylinux wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Check distributions
        run: twine check dist/* wheelhouse/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*
            wheelhouse/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gobot
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
