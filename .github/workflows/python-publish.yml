name: Publish Python Package

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish distributions to PyPI after the build succeeds."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-sdist
          path: dist/*
          if-no-files-found: error

  build-wheels:
    name: Build wheel for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install -U build

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            libeigen3-dev \
            libgl-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            uuid-dev \
            vim-common \
            xorg-dev

      - name: Build wheel
        run: python -m build --wheel --outdir wheelhouse

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-python-${{ matrix.python-version }}
          path: wheelhouse/*
          if-no-files-found: error

  check:
    name: Check distributions
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-distributions-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        run: python -m pip install -U twine

      - name: Check distributions
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: check
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gobot
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: downloaded-distributions

      - name: Prepare distributions
        run: |
          mkdir -p dist
          find downloaded-distributions -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec mv {} dist/ \;
          ls -la dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
