name: Publish Python Package

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish distributions to PyPI after the build succeeds."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel for Python ${{ matrix.python-version }}
    runs-on: [self-hosted, linux, x64, gpu]
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out submodules
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -z "${SUBMODULES_TOKEN}" ]; then
            echo "::error::Missing SUBMODULES_TOKEN secret. Create a fine-grained PAT with Contents: Read access to the private submodule repositories."
            exit 1
          fi
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --force --depth=1 --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install -U 'cmake>=3.26' ninja auditwheel build packaging patchelf

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            gcc-11 \
            g++-11 \
            libeigen3-dev \
            libgl-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            uuid-dev \
            vim-common \
            xorg-dev

      - name: Check CUDA build environment
        run: |
          nvidia-smi
          nvcc --version

      - name: Resolve LuisaCompute cache key
        id: luisa-cache-key
        run: |
          {
            git -C 3rdparty/luisa_compute rev-parse HEAD
            sha256sum scripts/build_luisa_compute.sh
            nvcc --version
            g++-11 --version
          } > "$RUNNER_TEMP/luisa-cache-key"
          echo "value=$(sha256sum "$RUNNER_TEMP/luisa-cache-key" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore LuisaCompute install
        id: luisa-cache
        uses: actions/cache@v4
        with:
          path: build/luisa_compute/install
          key: luisa-cuda-${{ runner.os }}-${{ steps.luisa-cache-key.outputs.value }}

      - name: Build LuisaCompute CUDA runtime
        if: steps.luisa-cache.outputs.cache-hit != 'true'
        run: scripts/build_luisa_compute.sh

      - name: Build wheel
        run: python -m build --wheel --outdir wheelhouse-unrepaired

      - name: Repair wheel
        run: |
          python -m auditwheel repair \
            --exclude libcuda.so.1 \
            --exclude libEGL.so.1 \
            --exclude libGLdispatch.so.0 \
            --exclude libGLX.so.0 \
            --exclude libOpenGL.so.0 \
            --exclude libGL.so.1 \
            --plat manylinux_2_35_x86_64 \
            --wheel-dir wheelhouse \
            wheelhouse-unrepaired/*.whl

      - name: Verify complete wheel payload
        run: python scripts/verify_release_wheel.py wheelhouse/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-python-${{ matrix.python-version }}
          path: wheelhouse/*
          if-no-files-found: error

  check:
    name: Check distributions
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Check out verification script
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-distributions-python-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        run: python -m pip install -U twine

      - name: Check distributions
        run: |
          twine check dist/*
          python scripts/verify_release_wheel.py dist/*.whl

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: check
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gobot
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: downloaded-distributions

      - name: Prepare distributions
        run: |
          mkdir -p dist
          find downloaded-distributions -type f -name "*.whl" -exec mv {} dist/ \;
          ls -la dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
