name: Publish Python Package

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish distributions to PyPI after the build succeeds."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-luisa:
    name: Build LuisaCompute CUDA runtime
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    container:
      image: nvidia/cuda:12.8.1-devel-ubuntu22.04

    steps:
      - name: Prepare CUDA build container
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            ca-certificates \
            g++-11 \
            gcc-11 \
            git \
            gzip \
            libx11-dev \
            ninja-build \
            python3 \
            python3-pip \
            tar \
            uuid-dev \
            zstd
          python3 -m pip install -U 'cmake>=3.26'

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out LuisaCompute
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update \
            --init --force --depth=1 3rdparty/luisa_compute
          git -C 3rdparty/luisa_compute submodule sync --recursive
          git -C 3rdparty/luisa_compute -c protocol.version=2 submodule update \
            --init --force --depth=1 --recursive

      - name: Check CUDA compiler
        run: nvcc --version

      - name: Resolve LuisaCompute cache key
        id: luisa-cache-key
        run: |
          {
            git -C 3rdparty/luisa_compute rev-parse HEAD
            git -C 3rdparty/luisa_compute submodule status --recursive
            sha256sum scripts/build_luisa_compute.sh
            nvcc --version
            g++-11 --version
          } > "$RUNNER_TEMP/luisa-cache-key"
          echo "value=$(sha256sum "$RUNNER_TEMP/luisa-cache-key" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore LuisaCompute install
        id: luisa-cache
        uses: actions/cache/restore@v4
        with:
          path: build/luisa_compute/install
          key: luisa-cuda-12.8.1-${{ runner.os }}-${{ steps.luisa-cache-key.outputs.value }}

      - name: Build LuisaCompute CUDA runtime
        if: steps.luisa-cache.outputs.cache-hit != 'true'
        run: |
          echo "Building LuisaCompute with $(nproc) parallel jobs"
          scripts/build_luisa_compute.sh

      - name: Save LuisaCompute install
        if: steps.luisa-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/luisa_compute/install
          key: luisa-cuda-12.8.1-${{ runner.os }}-${{ steps.luisa-cache-key.outputs.value }}

      - name: Pack LuisaCompute and CUDA build SDK
        run: |
          test -x build/luisa_compute/install/bin/luisa_nvrtc
          CUDA_ROOT="${CUDA_HOME:-/usr/local/cuda}"
          CUDA_TARGET_ROOT="${CUDA_ROOT}/targets/x86_64-linux"
          mkdir -p build/cuda-toolkit/lib64/stubs
          if test -f "${CUDA_ROOT}/version.json"; then
            cp -a "${CUDA_ROOT}/version.json" build/cuda-toolkit/version.json
          elif test -f "${CUDA_ROOT}/version.txt"; then
            cp -a "${CUDA_ROOT}/version.txt" build/cuda-toolkit/version.txt
          else
            CUDA_VERSION_LINE="$(nvcc --version | sed -n 's/.*V\([0-9][0-9.]*\).*/CUDA Version \1/p' | tail -n 1)"
            test -n "${CUDA_VERSION_LINE}"
            printf '%s\n' "${CUDA_VERSION_LINE}" > build/cuda-toolkit/version.txt
          fi
          cp -a "${CUDA_TARGET_ROOT}/include" build/cuda-toolkit/include
          cp -a "${CUDA_TARGET_ROOT}"/lib/libcudart.so* build/cuda-toolkit/lib64/
          cp -a "${CUDA_TARGET_ROOT}/lib/stubs/libcuda.so" \
            build/cuda-toolkit/lib64/stubs/libcuda.so
          test -f build/cuda-toolkit/version.json \
            || test -f build/cuda-toolkit/version.txt
          test -f build/cuda-toolkit/include/cuda.h
          test -f build/cuda-toolkit/lib64/stubs/libcuda.so
          tar -C build -czf "$RUNNER_TEMP/luisa-cuda-build-inputs.tar.gz" \
            luisa_compute/install cuda-toolkit

      - name: Upload LuisaCompute and CUDA build SDK
        uses: actions/upload-artifact@v4
        with:
          name: luisa-cuda-build-inputs
          path: ${{ runner.temp }}/luisa-cuda-build-inputs.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-wheels:
    name: Build wheel for Python ${{ matrix.python-version }}
    needs: build-luisa
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Install native dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            ca-certificates \
            curl \
            gcc-11 \
            g++-11 \
            git \
            gzip \
            libegl-dev \
            libeigen3-dev \
            libgl-dev \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            ninja-build \
            pkg-config \
            tar \
            unzip \
            uuid-dev \
            vim-common \
            xorg-dev \
            xz-utils

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out submodules
        run: |
          git submodule sync
          git -c protocol.version=2 submodule update --init --force --depth=1

      - name: Download LuisaCompute and CUDA build SDK
        uses: actions/download-artifact@v4
        with:
          name: luisa-cuda-build-inputs
          path: ${{ runner.temp }}/luisa-cuda-build-inputs

      - name: Restore LuisaCompute and CUDA build SDK
        run: |
          mkdir -p build
          tar -C build -xzf \
            "$RUNNER_TEMP/luisa-cuda-build-inputs/luisa-cuda-build-inputs.tar.gz"
          test -x build/luisa_compute/install/bin/luisa_nvrtc
          test -f build/cuda-toolkit/include/cuda.h
          test -f build/cuda-toolkit/lib64/stubs/libcuda.so

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install -U 'cmake>=3.26' ninja auditwheel build packaging patchelf

      - name: Check CUDA build SDK
        run: |
          test -f build/cuda-toolkit/version.json \
            || test -f build/cuda-toolkit/version.txt

      - name: Build wheel
        run: |
          CMAKE_ARGS="-DCUDAToolkit_ROOT=$PWD/build/cuda-toolkit" \
            python -m build --wheel --outdir wheelhouse-unrepaired

      - name: Repair wheel
        run: |
          python -m auditwheel repair \
            --exclude libcuda.so.1 \
            --exclude libEGL.so.1 \
            --exclude libGLdispatch.so.0 \
            --exclude libGLX.so.0 \
            --exclude libOpenGL.so.0 \
            --exclude libGL.so.1 \
            --plat manylinux_2_35_x86_64 \
            --wheel-dir wheelhouse \
            wheelhouse-unrepaired/*.whl

      - name: Verify complete wheel payload
        run: python scripts/verify_release_wheel.py wheelhouse/*.whl

      - name: Smoke test installed wheel
        run: |
          python -m venv "$RUNNER_TEMP/gobot-wheel-smoke"
          "$RUNNER_TEMP/gobot-wheel-smoke/bin/python" -m pip install \
            --no-deps wheelhouse/*.whl
          "$RUNNER_TEMP/gobot-wheel-smoke/bin/python" \
            scripts/smoke_installed_wheel.py

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-python-${{ matrix.python-version }}
          path: wheelhouse/*
          if-no-files-found: error

  check:
    name: Check distributions
    needs: build-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Check out verification script
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-distributions-python-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        run: python -m pip install -U twine

      - name: Check distributions
        run: |
          twine check dist/*
          python scripts/verify_release_wheel.py dist/*.whl

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: check
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gobot
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: downloaded-distributions

      - name: Prepare distributions
        run: |
          mkdir -p dist
          find downloaded-distributions -type f -name "*.whl" -exec mv {} dist/ \;
          ls -la dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
