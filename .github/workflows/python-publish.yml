name: Publish Python Package

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish distributions to PyPI after the build succeeds."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-sdist
          path: dist/*
          if-no-files-found: error

  build-wheels:
    name: Build ${{ matrix.cibw-build }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cibw-build:
          - cp310-manylinux_x86_64
          - cp311-manylinux_x86_64
          - cp312-manylinux_x86_64
          - cp313-manylinux_x86_64
          - cp314-manylinux_x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install -U build cibuildwheel

      - name: Build manylinux wheel
        env:
          CIBW_BUILD: ${{ matrix.cibw-build }}
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-${{ matrix.cibw-build }}
          path: wheelhouse/*
          if-no-files-found: error

  check:
    name: Check distributions
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-distributions-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        run: python -m pip install -U twine

      - name: Check distributions
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: check
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gobot
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: downloaded-distributions

      - name: Prepare distributions
        run: |
          mkdir -p dist
          find downloaded-distributions -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec mv {} dist/ \;
          ls -la dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
