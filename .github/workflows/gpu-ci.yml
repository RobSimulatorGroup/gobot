name: GPU CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

concurrency:
  group: gobot-gpu-ci
  cancel-in-progress: false

jobs:
  go1-mujoco-warp:
    name: GPU renderer and Go1 MuJoCo Warp
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check CUDA runner
        run: |
          nvidia-smi
          nvcc --version

      - name: Install LuisaCompute build tools
        run: |
          uv tool install 'cmake>=3.26'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build LuisaCompute CUDA runtime
        run: scripts/build_luisa_compute.sh

      - name: Install complete Gobot environment
        run: uv sync

      - name: Configure Luisa renderer integration test
        run: |
          PYTHON_EXECUTABLE="$(uv run --no-sync python -c 'import sys; print(sys.executable)')"
          cmake -S . -B build_gpu_renderer -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGOB_BUILD_TESTS=ON \
            -DGOB_BUILD_ASSIMP=OFF \
            -DGOB_BUILD_MUJOCO=OFF \
            -DGOB_BUILD_LUISA_RENDERER=ON \
            -DGOB_LUISA_COMPUTE_ROOT="$PWD/build/luisa_compute/install" \
            -DPython3_EXECUTABLE="${PYTHON_EXECUTABLE}"
          cmake --build build_gpu_renderer \
            --target test_luisa_renderer_module \
            --parallel "$(nproc)"

      - name: Test Luisa CUDA/OpenGL frame rendering
        run: |
          mkdir -p /tmp/gobot-gpu-ci/luisa-cache
          XDG_CACHE_HOME=/tmp/gobot-gpu-ci/luisa-cache \
          GOBOT_RUN_LUISA_GPU_TEST=1 \
            build_gpu_renderer/tests/test_luisa_renderer_module \
              --gtest_filter=LuisaRendererGpu.* \
              --gtest_color=yes

      - name: Test Python CUDA render product
        run: |
          XDG_CACHE_HOME=/tmp/gobot-gpu-ci/luisa-cache \
          GOBOT_RUN_LUISA_GPU_TEST=1 \
            uv run --no-sync python tests/python/test_render_product_cuda.py

      - name: Validate reference fixture
        run: uv run --no-sync python tests/python/test_go1_reference_fixture.py

      - name: Test MuJoCo Warp provider
        run: uv run --no-sync python tests/python/test_mujoco_warp_provider.py

      - name: Test Go1 MuJoCo Warp task
        run: uv run --no-sync python tests/python/test_go1_mujoco_warp_env.py

      - name: Test pinned Go1 reference parity
        run: uv run --no-sync python tests/python/test_go1_reference_parity.py

      - name: Benchmark Go1 MuJoCo Warp
        run: |
          mkdir -p /tmp/gobot-gpu-ci/benchmarks
          for num_envs in 256 1024 2048; do
            uv run --no-sync python benchmark/go1_velocity_benchmark.py \
              --backend mujoco-warp \
              --device cuda:0 \
              --num-envs "${num_envs}" \
              --steps 50 \
              --warmup-steps 10 \
              --no-step-extras \
              --json-out "/tmp/gobot-gpu-ci/benchmarks/go1_warp_${num_envs}.json"
          done

      - name: Check MuJoCo Warp benchmark admission
        run: |
          uv run --no-sync python benchmark/check_go1_warp_admission.py \
            /tmp/gobot-gpu-ci/benchmarks/go1_warp_256.json \
            /tmp/gobot-gpu-ci/benchmarks/go1_warp_1024.json \
            /tmp/gobot-gpu-ci/benchmarks/go1_warp_2048.json \
            --minimum-throughput 256=8000 \
            --minimum-throughput 1024=16000 \
            --minimum-throughput 2048=25000 \
            --minimum-scale-factor 1.05

      - name: Run PPO admission training
        run: |
          mkdir -p /tmp/gobot-gpu-ci/training
          uv run --no-sync python -m examples.go1.train.go1_velocity_train \
            --backend mujoco-warp \
            --device cuda:0 \
            --num-envs 256 \
            --iterations 3 \
            --save-interval 3 \
            --no-step-extras \
            --log-dir /tmp/gobot-gpu-ci/training \
            --policy-out /tmp/gobot-gpu-ci/training/policy.pt

      - name: Upload GPU results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gobot-go1-gpu-results
          path: /tmp/gobot-gpu-ci
          if-no-files-found: warn
          retention-days: 14
